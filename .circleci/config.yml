version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1
  aws-ecr: circleci/aws-ecr@9.8.1
  slack: circleci/slack@6.1.3

#   EXECUTORS   ################################################################################
executors:
  basic-executor:
    resource_class: small
    docker:
      - image: cimg/ruby:4.0.5-browsers
  test-executor:
    resource_class: medium
    docker:
      - image: checkclientqualifiesdocker/circleci-image:ruby-4-0-5-upgrade
        auth:
          username: $DOCKERHUB_USER_CCQ
          password: $DOCKERHUB_PAT_CCQ
        environment:
          VCR_RECORD_MODE: none
          COVERAGE: true
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: user
          TZ: "Europe/London"
          PARALLEL_TEST_PROCESSORS: 5
          PARALLEL_TEST_FIRST_IS_1: true
      - image: cimg/postgres:17.4
        environment:
          POSTGRES_USER: user
          POSTGRES_DB: ccq_test
  embedded-test-executor:
    resource_class: small
    docker:
      - image: cimg/ruby:4.0.5-browsers
        environment:
          VCR_RECORD_MODE: none
          RAILS_ENV: test
          TZ: "Europe/London"
          REDIS_URL: redis://localhost:6379/0
      - image: cimg/redis:7.0
  e2e-executor:
    resource_class: small
    docker:
      - image: cimg/ruby:4.0.5-browsers
        environment:
          VCR_RECORD_MODE: none
          COVERAGE: true
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: user
          TZ: "Europe/London"
          CFE_HOST: http://localhost:3000
      - image: cimg/postgres:10.18
        environment:
          POSTGRES_USER: user
          POSTGRES_DB: ccq_test
      - image: $CFE_ECR_ENDPOINT
        aws_auth:
          oidc_role_arn: $CFE_CIVIL_ECR_ROLE_TO_ASSUME
        environment:
          SECRET_KEY_BASE: can_be_anything
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: cfe_db
          POSTGRES_DATABASE: cfe
          RAILS_ENV: production
          LEGAL_FRAMEWORK_API_HOST: https://legal-framework-api-staging.cloud-platform.service.justice.gov.uk
      - image: cimg/postgres:14.8
        name: cfe_db
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
  cloud-platform-executor:
    docker:
      - image: ministryofjustice/cloud-platform-tools:2.1
        environment:
          GITHUB_TEAM_NAME_SLUG: check-client-qualifies
          TZ: Europe/London

#   REFERENCES  ################################################################################
references:
  authenticate_k8s: &authenticate_k8s
    run:
      name: Authenticate with cluster
      command: |
        echo -n ${K8S_CLUSTER_CERT} | base64 -d > ./ca.crt
        kubectl config set-cluster ${K8S_CLUSTER_NAME} --certificate-authority=./ca.crt --server=https://${K8S_CLUSTER_NAME}
        kubectl config set-credentials circleci --token=${K8S_TOKEN}
        kubectl config set-context ${K8S_CLUSTER_NAME} --cluster=${K8S_CLUSTER_NAME} --user=circleci --namespace=${K8S_NAMESPACE}
        kubectl config use-context ${K8S_CLUSTER_NAME}
        echo ${K8S_CLUSTER_NAME}

  setup_database: &setup_database
    run:
      name: Database Setup
      command: |
        bundle exec rake db:create db:schema:load
        bundle exec rake db:migrate:with_data

  setup_parallel_database: &setup_parallel_database
    run:
      name: Parallel Database Setup
      command: |
        # Create test databases
        bin/rails db:create RAILS_ENV=test
        # Load main application schema (includes cache tables)
        RAILS_ENV=test bin/rails db:schema:load
        # Create and setup parallel test databases
        RAILS_ENV=test bundle exec rake parallel:create
        RAILS_ENV=test bundle exec rake parallel:load_schema

#     JOBS      ################################################################################
jobs:
  install_dependencies:
    executor: basic-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/
      - restore_cache:
          key: check-client-qualifies-{{ checksum "Gemfile.lock" }}-v1-{{ checksum "yarn.lock" }}
      - run:
          name: Which bundler?
          command: bundle -v
      - run:
          name: Install yarn modules
          command: yarn install
      - run:
          name: Install ruby gems
          command: |
            bundle config set path 'vendor/bundle'
            bundle config set without 'development'
            bundle check || {
              # Install CMake - required to install undercover gem
              sudo apt update && sudo apt install cmake
              # Install missing gems
              bundle install
            }
      - run:
          name: Install postgres client
          command: sudo apt-get install -y postgresql-client
      - run:
          name: Compile assets for test run
          command: bundle exec rake test:prepare
      - save_cache:
          key: check-client-qualifies-{{ checksum "Gemfile.lock" }}-v1-{{ checksum "yarn.lock" }}
          paths:
            - vendor/bundle
            - node_modules
      - persist_to_workspace:
          root: ./
          paths:
            - vendor/bundle
            - node_modules
            - app/assets/builds
            - .bundle/config
      - slack/notify:
          channel: eligibility-alerts-uat
          event: fail
          template: basic_fail_1
          branch_pattern: main

  #########################################
  run_specs:
    executor: test-executor
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - *setup_parallel_database
      - run:
          name: Run tests
          environment:
            CCQ_MODE: standalone
          command: |
            bundle exec parallel_rspec
      - run:
          name: Persist standalone coverage resultset
          command: |
            mkdir -p tmp/coverage_resultsets
            cp coverage/.resultset.json tmp/coverage_resultsets/standalone.resultset.json
      - store_test_results:
          path: /tmp/test-results/rspec
      - persist_to_workspace:
          root: ./
          paths:
            - tmp/parallel_runtime_rspec.log
            - tmp/coverage_resultsets/standalone.resultset.json
      - slack/notify:
          channel: eligibility-alerts-uat
          event: fail
          template: basic_fail_1
          branch_pattern: main

  #########################################
  run_embedded_specs:
    executor: embedded-test-executor
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - run:
          name: Run tests
          environment:
            CCQ_MODE: embedded
            DISABLE_BOOTSNAP: 1
            PARALLEL_TEST_PROCESSORS: 3
          command: |
            bundle exec parallel_rspec
      - run:
          name: Persist embedded coverage resultset
          command: |
            mkdir -p tmp/coverage_resultsets
            cp coverage/.resultset.json tmp/coverage_resultsets/embedded.resultset.json

      - store_test_results:
          path: /tmp/test-results/rspec
      - persist_to_workspace:
          root: ./
          paths:
            - tmp/coverage_resultsets/embedded.resultset.json

  #########################################
  collate_coverage:
    executor: basic-executor
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - run:
          name: Merge raw resultsets
          command: |
            mkdir -p coverage
            ruby -rjson -e 'files = Dir["tmp/coverage_resultsets/*.resultset.json"]; merged = files.sort.each_with_object({}) { |file, memo| memo.merge!(JSON.parse(File.read(file))) }; File.write("coverage/.resultset.json", JSON.generate(merged))'
      - run:
          name: Collate coverage
          command: |
            bundle exec ruby bin/collate_coverage
      - store_artifacts:
          path: coverage
      - slack/notify:
          channel: eligibility-alerts-uat
          event: fail
          template: basic_fail_1
          branch_pattern: main

  #########################################
  end2end_tests:
    executor: e2e-executor
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - *setup_database
      - run:
          name: Prepare for test run
          command: bundle exec rake test:prepare
      - run:
          name: Run CFE End to End tests
          command: |
            COVERAGE=false bundle exec rspec -t end2end --format documentation spec/**/**_spec.rb

  #########################################
  linters:
    executor: basic-executor
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - run:
          name: erb-lint checks
          command: |
            bundle exec erblint --lint-all
      - run:
          name: Slim Lint
          command: |
            bundle exec slim-lint **/*.slim
      - slack/notify:
          channel: eligibility-alerts-uat
          event: fail
          template: basic_fail_1
          branch_pattern: main

  #########################################
  build_and_push:
    executor:
      name: aws-ecr/default
      docker_layer_caching: true
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $ECR_ROLE_TO_ASSUME_CCQ
          region: $ECR_REGION
      - run: |
          aws ecr get-login-password --region $ECR_REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com
      - run:
          name: Set ECR_TAG environment variable for use in next step
          command: |
            [[ "$CIRCLE_BRANCH" == "main" ]] && ECR_TAG="main-$CIRCLE_SHA1,latest" || ECR_TAG="branch-$CIRCLE_SHA1"
            echo "export ECR_TAG=$ECR_TAG" >> "$BASH_ENV"
            source "$BASH_ENV"
      - aws-ecr/build_image:
          push_image: true
          account_id: $AWS_ECR_REGISTRY_ID
          tag: $ECR_TAG
          region: $ECR_REGION
          repo: $ECR_REPOSITORY_CCQ

  #########################################
  deploy:
    parameters:
      environment:
        type: string
    executor: cloud-platform-executor
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - *authenticate_k8s
      - run:
          name: Deploy LAA Check-your-client-qualifies-for-legal-aid service to <<
            parameters.environment >>
          command: |
            ./bin/deploy << parameters.environment >>
      - slack/notify:
          channel: eligibility-alerts-<< parameters.environment >>
          event: fail
          template: basic_fail_1

  #########################################
  deploy_infrastructure_uat:
    executor: cloud-platform-executor
    steps:
      - checkout
      - *authenticate_k8s
      - run:
          name: Deploy LAA Check-your-client-qualifies-for-legal-aid service's
            /infrastructure to UAT
          command: |
            kubectl apply --record=false -f ./infrastructure/laa-check-client-qualifies-uat/
      - slack/notify:
          channel: eligibility-alerts-uat
          event: fail
          template: basic_fail_1

  #########################################
  production_deploy_approved:
    executor: basic-executor
    steps:
      - slack/notify:
          channel: rcw-engineering
          event: always
          custom: |
            {
              "text": ":white_check_mark: Production hold approved by *${CIRCLE_USERNAME:-unknown}* for *${CIRCLE_PROJECT_REPONAME:-this project}* on branch *${CIRCLE_BRANCH:-unknown}*.\nWorkflow: ${CIRCLE_BUILD_URL}"
            }

#   WORKFLOWS   ################################################################################
workflows:
  run_ci:
    jobs:
      - install_dependencies
      - linters:
          requires:
            - install_dependencies
      - run_specs:
          requires:
            - install_dependencies
      - run_embedded_specs:
          requires:
            - install_dependencies
      - collate_coverage:
          requires:
            - run_specs
            - run_embedded_specs
      - end2end_tests:
          requires:
            - install_dependencies
      - build_and_push:
          requires:
            - install_dependencies

      #########################################
      - deploy:
          name: Deploy to UAT
          environment: ccq-uat
          context: laa-check-client-qualifies-uat
          requires:
            - collate_coverage
            - end2end_tests
            - linters
            - build_and_push

      #########################################
      - deploy:
          name: Deploy to Staging
          environment: ccq-staging
          context: laa-check-client-qualifies-staging
          requires:
            - collate_coverage
            - end2end_tests
            - linters
            - build_and_push
            - Deploy to UAT
          filters:
            branches:
              only:
                - main

      #########################################
      - slack/on-hold:
          channel: rcw-engineering
          mentions: '@mnm-engineers'
          requires:
            - Deploy to Staging

      - production_deploy_approval:
          type: approval
          requires:
            - Deploy to Staging
            - slack/on-hold
          filters:
            branches:
              only:
                - main

      #########################################
      - production_deploy_approved:
          requires:
            - production_deploy_approval
          filters:
            branches:
              only:
                - main

      #########################################
      - deploy:
          name: Deploy to Production
          environment: ccq-production
          context: laa-check-client-qualifies-production
          requires:
            - collate_coverage
            - end2end_tests
            - linters
            - build_and_push
            - Deploy to Staging
            - production_deploy_approval
            - production_deploy_approved
          filters:
            branches:
              only:
                - main

      #########################################
      - deploy_infrastructure_uat:
          context: laa-check-client-qualifies-uat
          filters:
            branches:
              only:
                - main
